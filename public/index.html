<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MadHive Platform Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/dashboard.css?v=13">
  <link rel="stylesheet" href="/css/mapbox-gl.css">
  <link rel="stylesheet" href="/css/mapbox-map.css?v=2">
</head>
<body>

  <!-- ===== top bar ===== -->
  <header id="top-bar">
    <div class="top-left">
      <span class="logo-text">MADHIVE</span>
      <span class="logo-sub">PLATFORM</span>
    </div>
    <div class="top-center">
      <span id="page-icon"></span>
      <span id="page-title"></span>
      <span id="page-subtitle"></span>
    </div>
    <div class="top-right">
      <span id="data-source" class="data-source">GCP Cloud Monitoring</span>
      <span class="separator">|</span>
      <span id="last-refresh" class="last-refresh"><span class="refresh-dot"></span><span id="refresh-label">—</span></span>
      <span class="separator">|</span>
      <span id="clock"></span>
    </div>
  </header>

  <!-- ===== dashboard pages rendered here ===== -->
  <main id="dashboard-container"></main>

  <!-- ===== bottom navigation ===== -->
  <nav id="bottom-bar">
    <div id="nav-dots-row">
      <div id="nav-dots"></div>
      <button id="pause-btn" class="pause-btn" title="Pause slideshow (Space)">⏸</button>
    </div>
    <div id="rotation-track">
      <div id="rotation-progress"></div>
    </div>
  </nav>

  <script src="/js/mapbox-gl.min.js"></script>
  <script src="/js/mapbox-map.js?v=8"></script>
  <script src="/js/us-states.js?v=11"></script>
  <script src="/js/charts.js?v=18"></script>
  <script src="/js/widgets.js?v=11"></script>
  <script src="/js/app.js?v=14"></script>
</body>
</html>
