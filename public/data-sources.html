<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configure and monitor data source integrations for MadHive TV Dashboards">
    <title>Data Source Management | MadHive TV Dashboards</title>
    <link rel="stylesheet" href="/css/data-sources.css">
</head>
<body>
    <div class="data-sources-container">
        <header class="data-sources-header">
            <div class="header-content">
                <div class="header-title">
                    <h1>Data Source Management</h1>
                    <p class="subtitle">Configure and monitor 17 data source integrations</p>
                </div>
                <div class="header-actions">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search data sources..."
                        aria-label="Search data sources"
                    >
                    <a href="/admin.html" class="btn btn-secondary">Back to Admin</a>
                </div>
            </div>
        </header>

        <div class="data-sources-grid" id="data-sources-grid">
            <div class="loading-message">
                <p>Loading data sources...</p>
            </div>
        </div>
    </div>

    <!-- Configuration Modal -->
    <div id="config-modal" class="modal" style="display: none">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Configure Data Source</h2>
                <button class="close-button" aria-label="Close modal">&times;</button>
            </div>

            <div class="modal-body">
                <form id="config-form">
                    <!-- Form fields will be dynamically generated by JS -->
                </form>

                <div id="audit-log-section" class="audit-log-section" style="display: none">
                    <h3>Configuration History</h3>
                    <div id="audit-log-content" class="audit-log-content">
                        <!-- Audit entries will be dynamically generated by JS -->
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="view-history-button" class="btn btn-secondary">
                    View History
                </button>
                <button type="button" id="test-connection-button" class="btn btn-info">
                    Test Connection
                </button>
                <button type="button" id="cancel-button" class="btn btn-secondary">
                    Cancel
                </button>
                <button type="submit" form="config-form" id="save-button" class="btn btn-primary">
                    Save Configuration
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <script type="module" src="/js/data-sources-app.js"></script>
</body>
</html>
