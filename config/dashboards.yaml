        queryId: lb-request-count-bidder
        position:
          col: 1
          row: 2
          colSpan: 2
  - grid:
      columns: 1
      gap: 14
      rows: 1
    icon: flow
    id: data-pipeline
    name: Data Flow
    subtitle: End-to-End Pipeline
    widgets:
      - id: pipeline
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: data-pipeline-flow
        source: computed
        title: End-to-End Data Flow
        type: pipeline-flow
        stageConfig:
          - id: ingest
            name: Ingest
            project: mad-data
            metricType: pubsub.googleapis.com/topic/send_message_operation_count
            minutes: 5
          - id: transform
            name: Transform
            project: mad-master
            metricType: custom.googleapis.com/opencensus/mhive/pipe/rows_written
            minutes: 10
          - id: store
            name: Store
            project: mad-master
            metricType: custom.googleapis.com/opencensus/mhive/pipe/rows_written
            minutes: 10
          - id: process
            name: Process
            project: mad-data
            metricType: bigquery.googleapis.com/query/execution_times
            minutes: 10
          - id: deliver
            name: Deliver
            project: mad-master
            metricType: run.googleapis.com/request_count
            minutes: 30
          - id: report
            name: Report
            project: mad-master
            metricType: custom.googleapis.com/opencensus/mhive/pipe/rows_written
            minutes: 10
