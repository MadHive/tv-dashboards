dashboards:
  - id: platform-overview
    name: Platform Overview
    subtitle: Real-Time Activity
    icon: bolt
    grid:
      columns: 4
      rows: 2
      gap: 14
    widgets:
      - id: bids-served
        type: big-number
        title: Bids Served
        source: gcp
        queryId: bidder-winner-candidates
        position:
          col: 1
          row: 1
          colSpan: 2
      - id: impressions-delivered
        type: stat-card
        title: Impressions Delivered
        source: gcp
        queryId: cloudrun-request-count-madmaster
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: bid-qps
        type: gauge
        title: Bid QPS
        source: gcp
        queryId: bidder-winner-candidates
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: /s
        min: 0
        max: 5000000
      - id: platform-uptime
        type: gauge
        title: Platform Uptime
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: events-processed
        type: big-number
        title: Events Processed
        source: gcp
        queryId: kafka-writes-madmaster
        position:
          col: 2
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: kafka-throughput
        type: big-number
        title: Kafka Writes
        source: gcp
        queryId: kafka-writes-madmaster
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: storage-volume
        type: stat-card
        title: Storage Volume
        source: gcp
        queryId: bigtable-table-bytes
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
  - id: services-health
    name: Services Health
    subtitle: Cloud Run Fleet
    icon: grid
    grid:
      columns: 3
      rows: 2
      gap: 14
    widgets:
      - id: fleet-health
        type: gauge
        title: Fleet Health
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: requests-served
        type: big-number
        title: Requests Served
        source: gcp
        queryId: cloudrun-request-count-madmaster
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: response-time
        type: gauge
        title: Median Latency (Cloud Run)
        source: gcp
        queryId: cloudrun-latency
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: ms
        min: 0
        max: 500
      - id: top-services
        type: bar-chart
        title: Top Services by Traffic
        source: gcp
        queryId: cloudrun-request-count-madmaster
        position:
          col: 1
          row: 2
          colSpan: 2
          rowSpan: 1
      - id: fastest-services
        type: bar-chart
        title: Fastest Response Times
        source: gcp
        queryId: cloudrun-latencies-madmaster
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
  - id: campaign-delivery
    name: Campaign Delivery
    subtitle: Nationwide Reach
    icon: map
    grid:
      columns: 1
      rows: 1
      gap: 0
    widgets:
      - id: usa-delivery-map
        type: usa-map
        title: ''
        source: bigquery
        queryId: delivery-geo-map
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
  - id: data-processing
    name: Data Processing
    subtitle: Analytics & Compute
    icon: data
    grid:
      columns: 3
      rows: 2
      gap: 14
    widgets:
      - id: analytics-queries
        type: big-number
        title: Analytics Queries
        source: gcp
        queryId: bigquery-query-count
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: compute-utilization
        type: gauge
        title: Compute Utilization
        source: gcp
        queryId: bigquery-slots-allocated
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: slots
        min: 0
        max: 2000
      - id: storage-volume
        type: stat-card
        title: Storage Volume
        source: gcp
        queryId: bigtable-table-bytes
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: messages-queued
        type: big-number
        title: Messages Queued
        source: gcp
        queryId: pubsub-undelivered-maddata
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: ingestion-topics
        type: bar-chart
        title: Ingestion by Topic
        source: gcp
        queryId: pubsub-topic-send-maddata
        position:
          col: 2
          row: 2
          colSpan: 2
  - id: bidder-cluster
    name: Bidder Cluster
    subtitle: Real-Time Bidding
    icon: bolt
    grid:
      columns: 4
      rows: 3
      gap: 14
    widgets:
      - id: bid-qps
        type: big-number
        title: Bid QPS
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 1
          row: 1
          colSpan: 2
      - id: win-rate
        type: stat-card
        title: Bid Rate (200s)
        source: gcp
        queryId: pubsub-wins-topic
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: error-rate
        type: stat-card
        title: Error Rate
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: timeout-rate
        type: gauge
        title: Timeout Rate
        source: gcp
        queryId: cloudrun-latency
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 1
      - id: response-latency
        type: gauge-row
        title: Response Latency
        source: gcp
        queryId: lb-backend-latencies
        position:
          col: 2
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: ms
        min: 0
        max: 200
      - id: bid-nobid-ratio
        type: stat-card
        title: No-Bid Rate (204s)
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: budget-pacing
        type: stat-card
        title: Load Shedding
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: qps-by-region
        type: bar-chart
        title: Response Code Breakdown
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 1
          row: 3
          colSpan: 2
      - id: response-by-backend
        type: bar-chart
        title: QPS by Backend
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 3
          row: 3
          colSpan: 2
  - id: data-pipeline
    name: Data Flow
    subtitle: End-to-End Pipeline
    icon: flow
    grid:
      columns: 1
      rows: 1
      gap: 14
    widgets:
      - id: pipeline
        type: pipeline-flow
        title: End-to-End Data Flow
        source: gcp
        queryId: pipe-bytes-written
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
  - id: rtb-infra
    name: RTB Infrastructure
    subtitle: Cluster Health
    icon: grid
    grid:
      columns: 4
      rows: 3
      gap: 14
    widgets:
      - id: bidder-nodes
        type: big-number
        title: Bidder Nodes
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: roger-nodes
        type: big-number
        title: Roger Nodes
        source: gcp
        queryId: k8s-uptime-roger
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: memcache-nodes
        type: big-number
        title: Memcache Nodes
        source: gcp
        queryId: k8s-uptime-memcached
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: core-cluster-size
        type: stat-card
        title: Core Cluster Nodes
        source: gcp
        queryId: k8s-cpu-bidder
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: bidder-cpu
        type: gauge
        title: Bidder CPU P95
        source: gcp
        queryId: k8s-cpu-bidder
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: bidder-memory
        type: gauge
        title: Bidder Memory P95
        source: gcp
        queryId: k8s-memory-bidder
        position:
          col: 2
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: container-restarts
        type: stat-card
        title: Container Restarts
        source: gcp
        queryId: k8s-restart-bidder
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: bidder-error-rate
        type: gauge
        title: Bidder Error Rate
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: /s
        min: 0
        max: 1000
      - id: pipe-bytes-written
        type: big-number
        title: Pipe Bytes Written
        source: gcp
        queryId: pipe-bytes-written
        position:
          col: 1
          row: 3
          colSpan: 1
          rowSpan: 1
      - id: bidder-nodes-by-zone
        type: bar-chart
        title: Bidder Nodes by Zone
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 2
          row: 3
          colSpan: 2
      - id: lb-backend-503s
        type: stat-card
        title: LB 503s Rate
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 3
          colSpan: 1
          rowSpan: 1
  - grid:
      columns: 3
      gap: 14
      rows: 3
    icon: data
    id: campaign-pacing
    name: Campaign & Pacing
    subtitle: Roger Decision Engine
    widgets:
      - id: active-campaigns
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-campaigns
        source: gcp
        sparkline: true
        title: Active Campaigns
        type: big-number
      - id: global-win-rate
        max: 100
        min: 0
        position:
          col: 2
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-global-win-rate
        source: gcp
        title: Global Win Rate
        type: gauge
        unit: '%'
      - id: campaign-metas
        position:
          col: 3
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-campaign-metas
        source: gcp
        title: Campaign Metadata
        type: stat-card
      - id: pacing-p50
        max: 2
        min: 0
        position:
          col: 1
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-pacing-ratio
        source: gcp
        title: Pacing Ratio P50
        type: gauge
        unit: ''
      - id: roger-messages
        position:
          col: 2
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-send-count
        source: gcp
        sparkline: true
        title: Roger Messages
        type: big-number
      - id: ebrake-p50
        position:
          col: 3
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-ebrake
        source: gcp
        title: Emergency Brake
        type: stat-card
      - id: roger-send-latency
        max: 200
        min: 0
        position:
          col: 1
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: roger-send-latency
        source: gcp
        title: Send Latency P95
        type: gauge
        unit: ms
      - id: impression-rater
        position:
          col: 2
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: impressionrater-row-updates
        source: gcp
        sparkline: true
        title: Impressions Rated
        type: big-number
      - id: active-campaigns-count
        position:
          col: 3
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: roger-campaigns
        source: gcp
        title: Active Campaigns
        type: stat-card
  - id: data-infra
    name: Data Infrastructure
    subtitle: Kafka · Bigtable · PubSub
    icon: flow
    grid:
      columns: 4
      rows: 3
      gap: 14
    widgets:
      - id: kafka-requests
        type: big-number
        title: Kafka Requests
        source: gcp
        queryId: kafka-managed-request-count
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: kafka-lag
        type: stat-card
        title: Consumer Lag
        source: gcp
        queryId: kafka-managed-offset-lag
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: kafka-latency
        type: gauge
        title: Kafka Latency P95
        source: gcp
        queryId: kafka-managed-latency
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: ms
        min: 0
        max: 600
      - id: kafka-write-errors
        type: stat-card
        title: Write Error Rate
        source: gcp
        queryId: kafka-writes-madmaster
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: bigtable-reads
        type: big-number
        title: Bigtable Read RPS
        source: gcp
        queryId: bigtable-returned-rows
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: bigtable-requests
        type: big-number
        title: Bigtable Requests
        source: gcp
        queryId: bigtable-request-count
        position:
          col: 2
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: bigtable-latency
        type: gauge
        title: Bigtable P95 Latency
        source: gcp
        queryId: bigtable-latency
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: ms
        min: 0
        max: 100
      - id: bigtable-cpu
        type: gauge
        title: Bigtable CPU Load
        source: gcp
        queryId: bigtable-cpu-load
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: pubsub-events-unacked
        type: stat-card
        title: Events Backlog
        source: gcp
        queryId: pubsub-events-primary-unacked
        position:
          col: 1
          row: 3
          colSpan: 1
          rowSpan: 1
      - id: pubsub-wins-unacked
        type: stat-card
        title: Wins Backlog
        source: gcp
        queryId: pubsub-wins-unacked
        position:
          col: 2
          row: 3
          colSpan: 1
          rowSpan: 1
      - id: bigtable-tables
        type: bar-chart
        title: Bigtable Tables by Size
        source: gcp
        queryId: bigtable-table-bytes
        position:
          col: 3
          row: 3
          colSpan: 2
  - grid:
      columns: 3
      gap: 14
      rows: 3
    icon: bolt
    id: api-services
    name: API & Services
    subtitle: Mozart · Planner · Gary2
    widgets:
      - id: mozart-requests
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: mozart-total-requests
        source: gcp
        sparkline: true
        title: Mozart Requests
        type: big-number
      - id: mozart-impressions
        position:
          col: 2
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: mozart-total-impressions
        source: gcp
        sparkline: true
        title: Mozart Impressions
        type: big-number
      - id: mozart-errors
        position:
          col: 3
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: mozart-errors
        source: gcp
        title: Mozart Errors
        type: stat-card
      - id: planner-impressions
        position:
          col: 1
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: planner-impressions
        source: gcp
        sparkline: true
        title: Planner Impressions
        type: big-number
      - id: planner-reach
        position:
          col: 2
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: planner-reach
        source: gcp
        sparkline: true
        title: Planner Reach
        type: big-number
      - id: madserver-sql
        max: 500
        min: 0
        position:
          col: 3
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: madserver-sql-latency
        source: gcp
        title: SQL Latency P95
        type: gauge
        unit: ms
      - id: gary2-segments
        position:
          col: 1
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: gary2-segments-processed
        source: gcp
        sparkline: true
        title: Segments Processed
        type: big-number
      - id: gary2-backlog
        position:
          col: 2
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: gary2-pubsub-backlog
        source: gcp
        title: Gary2 Backlog
        type: stat-card
      - id: madserver-calls
        position:
          col: 3
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: madserver-rpc-calls
        source: gcp
        title: API Calls by Client
        type: bar-chart
  - id: security-posture
    name: Security Posture
    subtitle: VulnTrack Findings
    icon: shield
    grid:
      columns: 1
      rows: 1
      gap: 0
    widgets:
      - id: vulntrack-overview
        type: security-scorecard
        title: ''
        source: vulntrack
        queryId: vulntrack-security-posture
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
  - id: visual-showcase
    name: Visual Showcase
    subtitle: All 14 Widget Types
    icon: palette
    grid:
      columns: 4
      rows: 4
      gap: 14
    widgets:
      - id: showcase-bignumber
        type: big-number
        title: Total Users
        source: mock
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: showcase-statcard
        type: stat-card
        title: Active Sessions
        source: mock
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: showcase-gauge
        type: gauge
        title: System Health
        source: mock
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 100
      - id: showcase-sparkline
        type: bar-chart
        title: Quick Trend
        source: gcp
        queryId: lb-backend-latencies
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: showcase-multimetric
        type: multi-metric-card
        title: Key Metrics
        source: mock
        position:
          col: 1
          row: 2
          colSpan: 2
          rowSpan: 1
      - id: showcase-line
        type: gauge
        title: Traffic Over Time
        source: gcp
        queryId: mozart-total-impressions
        position:
          col: 1
          row: 3
          colSpan: 2
          rowSpan: 1
      - id: showcase-stackedbar
        type: stacked-bar-chart
        title: Conversion Funnel
        source: mock
        position:
          col: 1
          row: 4
          colSpan: 1
          rowSpan: 1
      - id: showcase-sankey
        type: sankey
        title: User Flow
        source: mock
        position:
          col: 2
          row: 4
          colSpan: 1
          rowSpan: 1
      - id: showcase-table
        type: table
        title: Recent Transactions
        source: mock
        position:
          col: 3
          row: 3
          colSpan: 2
          rowSpan: 2
global:
  refresh_interval: 8
  rotation_interval: 30
  title: MADHIVE PLATFORM
