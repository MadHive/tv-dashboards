dashboards:
  - id: platform-overview
    name: Platform Overview
    subtitle: Real-Time Activity
    icon: bolt
    grid:
      columns: 4
      rows: 2
      gap: 14
    widgets:
      - id: impressions-delivered
        type: stat-card
        title: Impressions Delivered
        source: gcp
        queryId: cloudrun-request-count-madmaster
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: platform-uptime
        type: big-number
        title: Platform Uptime
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: s
        min: 0
        max: 100
      - id: events-processed
        type: big-number
        title: Events Processed
        source: gcp
        queryId: kafka-writes-madmaster
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: storage-volume
        type: stat-card
        title: Storage Volume
        source: gcp
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
