dashboards:
  - id: platform-overview
    name: Platform Overview
    subtitle: Real-Time Activity
    icon: bolt
    grid:
      columns: 4
      rows: 2
      gap: 14
    widgets:
      - id: impressions-delivered
        type: stat-card
        title: Impressions Delivered
        source: gcp
        queryId: cloudrun-request-count-madmaster
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: platform-uptime
        type: big-number
        title: Platform Uptime
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
        unit: s
        min: 0
        max: 100
      - id: events-processed
        type: big-number
        title: Events Processed
        source: gcp
        queryId: kafka-writes-madmaster
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: storage-volume
        type: stat-card
        title: Storage Volume
        source: gcp
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
  - grid:
      columns: 1
      gap: 0
      rows: 1
    icon: map
    id: campaign-delivery-gl
    name: Campaign Delivery GL
    subtitle: Nationwide Reach (Mapbox)
    widgets:
      - id: usa-delivery-map-gl
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: campaign-delivery-map
        source: computed
        title: ''
        type: usa-map-gl
  - grid:
      columns: 1
      gap: 0
      rows: 1
    icon: map
    id: campaign-delivery-gl-ne
    name: Campaign Delivery GL
    subtitle: Northeast Markets (Mapbox)
    widgets:
      - id: usa-delivery-map-gl-ne
        mapConfig:
          minImpressions: 50
          region: northeast
          timeWindow: 7
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: campaign-delivery-map-ne
        source: computed
        title: ''
        type: usa-map-gl
  - grid:
      columns: 1
      gap: 0
      rows: 1
    icon: map
    id: campaign-delivery-gl-se
    name: Campaign Delivery GL
    subtitle: Southeast Markets (Mapbox)
    widgets:
      - id: usa-delivery-map-gl-se
        mapConfig:
          minImpressions: 50
          region: southeast
          timeWindow: 7
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: campaign-delivery-map-se
        source: computed
        title: ''
        type: usa-map-gl
  - grid:
      columns: 1
      gap: 0
      rows: 1
    icon: map
    id: campaign-delivery-gl-nw
    name: Campaign Delivery GL
    subtitle: Northwest Markets (Mapbox)
    widgets:
      - id: usa-delivery-map-gl-nw
        mapConfig:
          minImpressions: 50
          region: northwest
          timeWindow: 7
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: campaign-delivery-map-nw
        source: computed
        title: ''
        type: usa-map-gl
  - grid:
      columns: 1
      gap: 0
      rows: 1
    icon: map
    id: campaign-delivery-gl-sw
    name: Campaign Delivery GL
    subtitle: Southwest Markets (Mapbox)
    widgets:
      - id: usa-delivery-map-gl-sw
        mapConfig:
          minImpressions: 50
          region: southwest
          timeWindow: 7
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: campaign-delivery-map-sw
        source: computed
        title: ''
        type: usa-map-gl
  - id: bidder-cluster
    name: Bidder Cluster
    subtitle: Real-Time Bidding
    icon: bolt
    grid:
      columns: 4
      rows: 3
      gap: 14
    widgets:
      - id: bid-qps
        type: big-number
        title: Bid QPS
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 1
          row: 1
          colSpan: 2
      - id: win-rate
        type: stat-card
        title: Bid Rate (200s)
        source: gcp
        queryId: pubsub-wins-topic
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: error-rate
        type: stat-card
        title: Error Rate
        source: gcp
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: bid-nobid-ratio
        type: stat-card
        title: No-Bid Rate (204s)
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: budget-pacing
        type: stat-card
        title: Load Shedding
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: qps-by-region
        type: bar-chart
        title: Response Code Breakdown
        source: gcp
        queryId: lb-request-count-bidder
        position:
          col: 1
          row: 2
          colSpan: 2
  - grid:
      columns: 1
      gap: 14
      rows: 1
    icon: flow
    id: data-pipeline
    name: Data Flow
    subtitle: End-to-End Pipeline
    widgets:
      - id: pipeline
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        source: gcp
        title: End-to-End Data Flow
        type: pipeline-flow
  - id: rtb-infra
    name: RTB Infrastructure
    subtitle: Cluster Health
    icon: grid
    grid:
      columns: 4
      rows: 3
      gap: 14
    widgets:
      - id: bidder-nodes
        type: big-number
        title: Bidder Nodes
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 1
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: roger-nodes
        type: big-number
        title: Roger Nodes
        source: gcp
        queryId: k8s-uptime-roger
        position:
          col: 2
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: memcache-nodes
        type: big-number
        title: Memcache Nodes
        source: gcp
        queryId: k8s-uptime-memcached
        position:
          col: 3
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: core-cluster-size
        type: stat-card
        title: Core Cluster Nodes
        source: gcp
        position:
          col: 4
          row: 1
          colSpan: 1
          rowSpan: 1
      - id: bidder-cpu
        type: gauge
        title: Bidder CPU P95
        source: gcp
        queryId: k8s-cpu-bidder
        position:
          col: 1
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 1
      - id: bidder-memory
        type: gauge
        title: Bidder Memory P95
        source: gcp
        queryId: k8s-memory-bidder
        position:
          col: 2
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: '%'
        min: 0
        max: 1
      - id: container-restarts
        type: stat-card
        title: Container Restarts
        source: gcp
        queryId: k8s-restart-bidder
        position:
          col: 3
          row: 2
          colSpan: 1
          rowSpan: 1
      - id: bidder-error-rate
        type: gauge
        title: Bidder Error Rate
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 2
          colSpan: 1
          rowSpan: 1
        unit: /s
        min: 0
        max: 1000
      - id: pipe-bytes-written
        type: big-number
        title: K8 Pods
        source: gcp
        queryId: container-googleapis-com-quota-quota-pods-per-cluster-standard-usage-1772582047545
        position:
          col: 1
          row: 3
          colSpan: 1
          rowSpan: 1
      - id: bidder-nodes-by-zone
        type: bar-chart
        title: Bidder Nodes by Zone
        source: gcp
        queryId: k8s-uptime-bidder
        position:
          col: 2
          row: 3
          colSpan: 2
      - id: lb-backend-503s
        type: stat-card
        title: LB 503s Rate
        source: gcp
        queryId: lb-503-count
        position:
          col: 4
          row: 3
          colSpan: 1
          rowSpan: 1
  - grid:
      columns: 3
      gap: 14
      rows: 3
    icon: data
    id: campaign-pacing
    name: Campaign & Pacing
    subtitle: Roger Decision Engine
    widgets:
      - id: active-campaigns
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-campaigns
        source: gcp
        sparkline: true
        title: Active Campaigns
        type: big-number
      - id: global-win-rate
        max: 100
        min: 0
        position:
          col: 2
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-global-win-rate
        source: gcp
        title: Global Win Rate
        type: gauge
        unit: '%'
      - id: campaign-metas
        position:
          col: 3
          colSpan: 1
          row: 1
          rowSpan: 1
        project: mad-master
        queryId: roger-campaign-metas
        source: gcp
        title: Campaign Metadata
        type: stat-card
      - id: pacing-p50
        max: 500
        min: 0
        position:
          col: 1
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-pacing-ratio
        source: gcp
        title: Pacing Ratio P50
        type: gauge
        unit: ''
      - id: roger-messages
        position:
          col: 2
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-send-count
        source: gcp
        sparkline: true
        title: Roger Messages
        type: big-number
      - id: ebrake-p50
        position:
          col: 3
          colSpan: 1
          row: 2
          rowSpan: 1
        project: mad-master
        queryId: roger-ebrake
        source: gcp
        title: Emergency Brake
        type: stat-card
      - id: roger-send-latency
        max: 200
        min: 0
        position:
          col: 1
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: roger-send-latency
        source: gcp
        title: Send Latency P95
        type: gauge
        unit: ms
      - id: impression-rater
        position:
          col: 2
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: impressionrater-row-updates
        source: gcp
        sparkline: true
        title: Impressions Rated
        type: big-number
      - id: active-campaigns-count
        position:
          col: 3
          colSpan: 1
          row: 3
          rowSpan: 1
        project: mad-master
        queryId: roger-campaigns
        source: gcp
        title: Active Campaigns
        type: stat-card
  - grid:
      columns: 4
      gap: 14
      rows: 3
    icon: flow
    id: data-infra
    name: Data Infrastructure
    subtitle: Kafka · Bigtable · PubSub
    widgets:
      - id: kafka-requests
        position:
          col: 1
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: kafka-managed-request-count
        source: gcp
        title: Kafka Requests
        type: big-number
      - id: kafka-lag
        position:
          col: 2
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: kafka-managed-offset-lag
        source: gcp
        title: Consumer Lag
        type: stat-card
      - id: kafka-latency
        max: 600
        min: 0
        position:
          col: 3
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: kafka-managed-latency
        source: gcp
        title: Kafka Latency P95
        type: gauge
        unit: ms
      - id: kafka-write-errors
        position:
          col: 4
          colSpan: 1
          row: 1
          rowSpan: 1
        queryId: kafka-writes-madmaster
        source: gcp
        title: Write Error Rate
        type: stat-card
      - id: bigtable-reads
        position:
          col: 1
          colSpan: 1
          row: 2
          rowSpan: 1
        queryId: bigtable-returned-rows
        source: gcp
        title: Bigtable Read RPS
        type: big-number
      - id: bigtable-requests
        position:
          col: 2
          colSpan: 1
          row: 2
          rowSpan: 1
        queryId: bigtable-request-count
        source: gcp
        title: Bigtable Requests
        type: big-number
      - id: bigtable-latency
        max: 1000
        min: 0
        position:
          col: 3
          colSpan: 1
          row: 2
          rowSpan: 1
        queryId: bigtable-latency
        source: gcp
        title: Bigtable P95 Latency
        type: gauge
        unit: ms
      - id: bigtable-cpu
        max: 100
        min: 0
        position:
          col: 4
          colSpan: 1
          row: 2
          rowSpan: 1
        queryId: bigtable-cpu-load
        source: gcp
        title: Bigtable CPU Load
        type: gauge
        unit: '%'
      - id: pubsub-events-unacked
        position:
          col: 1
          colSpan: 1
          row: 3
          rowSpan: 1
        queryId: pubsub-events-primary-unacked
        source: gcp
        title: Events Backlog
        type: stat-card
      - id: pubsub-wins-unacked
        position:
          col: 2
          colSpan: 1
          row: 3
          rowSpan: 1
        queryId: pubsub-wins-unacked
        source: gcp
        title: Wins Backlog
        type: stat-card
      - id: bigtable-tables
        position:
          col: 3
          colSpan: 2
          row: 3
        queryId: bigtable-table-bytes
        source: gcp
        title: Bigtable Tables by Size
        type: bar-chart
global:
  refresh_interval: 8
  rotation_interval: 30
  title: MADHIVE PLATFORM
  activeTheme: neon-cyberpunk
